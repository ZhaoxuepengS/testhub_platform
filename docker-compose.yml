version: "3.8"

services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-testhub}
      MYSQL_USER: ${DB_USER:-testhub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-testhub123}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-testhub123}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_INTERNAL_PORT:-3306}:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DB_NAME: ${DB_NAME:-testhub}
      DB_USER: ${DB_USER:-testhub}
      DB_PASSWORD: ${DB_PASSWORD:-testhub123}
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      LANGUAGE_CODE: ${LANGUAGE_CODE:-zh-hans}
      TIME_ZONE: ${TIME_ZONE:-Asia/Shanghai}
    volumes:
      - media_data:/app/media
      - static_data:/app/static_files
    command: >
      bash -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput 2>/dev/null || true &&
        daphne -b 0.0.0.0 -p 8000 backend.asgi:application
      "

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      DB_NAME: ${DB_NAME:-testhub}
      DB_USER: ${DB_USER:-testhub}
      DB_PASSWORD: ${DB_PASSWORD:-testhub123}
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
    command: celery -A backend worker -l info

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      DB_NAME: ${DB_NAME:-testhub}
      DB_USER: ${DB_USER:-testhub}
      DB_PASSWORD: ${DB_PASSWORD:-testhub123}
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
    command: celery -A backend beat -l info

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - media_data:/usr/share/nginx/media:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s

volumes:
  mysql_data:
  redis_data:
  media_data:
  static_data:
